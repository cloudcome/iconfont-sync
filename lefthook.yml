# @ref https://evilmartians.github.io/lefthook/

pre-commit:
  commands:
    lint-staged:
      glob: '*'
      run: npx oxfmt --write --no-error-on-unmatched-pattern {staged_files} && npx oxlint --fix --fix-suggestions --fix-dangerously --no-error-on-unmatched-pattern {staged_files}
      # https://lefthook.dev/configuration/stage_fixed/
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      # https://commitlint.js.org/guides/local-setup.html
      run: npx --no-stdio -- commitlint --edit $1

pre-push:
  piped: true
  commands:
    build:
      priority: 1
      run: npm run build
    lint:
      priority: 2
      run: npm run lint
    test:
      priority: 3
      run: npm run test
